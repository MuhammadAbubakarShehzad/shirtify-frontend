<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shirtify Design Studio</title>
    <link rel="stylesheet" href="customizescreen.css">
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
 <header>
        <div class="logo">SHIRTIFY</div>
        <nav>
            <ul>
                <li><a href="../homescreen/homescreen.html">Home</a></li>
                <li><a href="../shopscreen/shopscreen.html">Shop</a></li>
                <li><a href="../customizescreen/customizescreen.html">Design Studio</a></li>
                <li><a href="../try-on-screen/try-on-screen.html">Try On</a></li>
                <li><a href="../aboutscreen/about.html">About</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search products">
            </div>
            <div class="icons">
                <i class="fas fa-shopping-cart" onclick="window.location.href='../addTocart/addtocart.html'" type="button"></i>
                <i class="fas fa-box" onclick="window.location.href='../orderinfo/orderinfo.html'" type="button"></i>
                <i class="fas fa-sign-out-alt" onclick="window.location.href='../login/login.html'"></i>
            </div>
        </div>
    </header>

    <!-- Stepper Section -->
    <main class="studio-container">
      <div id="customize-stepper">
        <h2>Customize Your Shirt</h2>
        <div class="step step-1">
          <label for="catalog-product">1. Select Shirt Style/Color:</label>
                    <select id="catalog-product">
                        <option value="" selected disabled>Loading shirts...</option>
                    </select>
        </div>
        <div class="step step-2" style="display:none; margin-top:16px;">
          <label for="catalog-size">2. Select Size:</label>
          <select id="catalog-size">
            <option value="" selected disabled>Select size</option>
            <option value="S">Small (S)</option>
            <option value="M">Medium (M)</option>
            <option value="L">Large (L)</option>
            <option value="XL">Extra Large (XL)</option>
          </select>
        </div>
        <div class="step step-3" style="margin-top:16px;">
          <button id="start-customizing-btn" disabled>Start Customizing</button>
        </div>
      </div>

      <!-- Design Studio (hidden initially) -->
      <div id="design-studio" style="display:none;">
        <div class="studio-header">
            <h1>Design Studio</h1>
            <div class="action-buttons">
                <button class="btn-save" onclick="saveDesign()">Save</button>
                <button class="btn-add" onclick="addCustomToCart()">Add to Cart</button>
            </div>
        </div>

        <div class="top-controls">
            <div class="input-group">
                <label>Design Name</label>
                <input type="text" id="design-name" placeholder="Enter your design name">
            </div>
            <div class="input-group">
                <label>Shirt Name</label>
                <input type="text" id="product-selected-display" readonly>
            </div>
            <div class="input-group">
                <label>Size</label>
                <input type="text" id="size-selected-display" readonly>
            </div>
        </div>

        <div class="editor-layout">
            <div class="canvas-section">
                <div class="toolbar">
                                        <div class="text-toolbar-container">
                                            <button onclick="addText()" title="Add Text" id="show-text-toolbar"><i class="fas fa-font"></i></button>
                                            <button id="show-shape-toolbar" title="Add Shape"><i class="fas fa-shapes"></i></button>
                                            <button id="pen-tool-btn" title="Pen Tool"><i class="fas fa-pen"></i></button>
                                            <div id="canva-text-toolbar" class="canva-text-toolbar" style="display:none;">
                                                <select id="font-family">
                                                    <option value="Arial">Arial</option>
                                                    <option value="Poppins">Poppins</option>
                                                    <option value="Roboto">Roboto</option>
                                                    <option value="Times New Roman">Times New Roman</option>
                                                    <option value="Montserrat">Montserrat</option>
                                                    <option value="Lato">Lato</option>
                                                </select>
                                                <input id="font-size" type="number" min="8" max="200" value="24" style="width:50px;">
                                                <button id="font-size-decrease" title="Decrease Font Size"><i class="fas fa-minus"></i></button>
                                                <button id="font-size-increase" title="Increase Font Size"><i class="fas fa-plus"></i></button>
                                                <button id="font-weight-light" title="Light"><i class="fas fa-font"></i></button>
                                                <button id="font-weight-regular" title="Regular"><i class="fas fa-font"></i></button>
                                                <button id="font-weight-bold" title="Bold"><i class="fas fa-bold"></i></button>
                                                <button id="text-bold" title="Bold"><i class="fas fa-bold"></i></button>
                                                <button id="text-italic" title="Italic"><i class="fas fa-italic"></i></button>
                                                <button id="text-underline" title="Underline"><i class="fas fa-underline"></i></button>
                                                <button id="text-strikethrough" title="Strikethrough"><i class="fas fa-strikethrough"></i></button>
                                                <input id="text-color" type="color" title="Text Color">
                                                <input id="highlight-color" type="color" title="Highlight Color">
                                                <button id="align-left" title="Align Left"><i class="fas fa-align-left"></i></button>
                                                <button id="align-center" title="Align Center"><i class="fas fa-align-center"></i></button>
                                                <button id="align-right" title="Align Right"><i class="fas fa-align-right"></i></button>
                                                <button id="align-justify" title="Justify"><i class="fas fa-align-justify"></i></button>
                                                <input id="line-height" type="number" min="0.5" max="3" step="0.1" value="1.2" title="Line Height" style="width:50px;">
                                                <input id="letter-spacing" type="number" min="-5" max="20" step="0.1" value="0" title="Letter Spacing" style="width:50px;">
                                                <select id="text-transform" title="Text Transform">
                                                    <option value="none">None</option>
                                                    <option value="uppercase">UPPERCASE</option>
                                                    <option value="lowercase">lowercase</option>
                                                    <option value="capitalize">Capitalize</option>
                                                </select>
                                                <button id="bullet-list" title="Bullet List"><i class="fas fa-list-ul"></i></button>
                                                <button id="numbered-list" title="Numbered List"><i class="fas fa-list-ol"></i></button>
                                                <button id="text-shadow" title="Text Shadow"><i class="fas fa-low-vision"></i></button>
                                                <button id="text-outline" title="Text Outline"><i class="fas fa-border-style"></i></button>
                                                <input id="text-opacity" type="range" min="0" max="1" step="0.05" value="1" title="Opacity">
                                                <button id="add-link" title="Add Hyperlink"><i class="fas fa-link"></i></button>
                                                <button id="duplicate-text" title="Duplicate"><i class="fas fa-clone"></i></button>
                                                <button id="delete-text" title="Delete"><i class="fas fa-trash"></i></button>
                                                <button id="bring-forward" title="Bring Forward"><i class="fas fa-arrow-up"></i></button>
                                                <button id="send-backward" title="Send Backward"><i class="fas fa-arrow-down"></i></button>
                                            </div>
                                        </div>
                    <!-- Shapes panel will be on the right side -->
                    <button onclick="triggerUpload()" title="Upload Image">🖼️</button>
                    <div class="separator"></div>
                    <button onclick="undo()" title="Undo">↩</button>
                    <button onclick="redo()" title="Redo">↪</button>
                    <button onclick="deleteObject()" title="Delete Selection">🗑️</button>
                </div>
                <div class="canvas-wrapper">
                    <canvas id="main-canvas" width="600" height="500"></canvas>
                </div>
            </div>
            <!-- Floating Shape Properties Sidebar -->
            <div id="shape-properties-sidebar" class="shape-properties-sidebar" style="display:none;">
                <div id="pen-properties" style="display:none;">
                    <h3>Pen Properties</h3>
                    <div class="prop-group">
                        <label for="pen-color">Pen Color</label>
                        <input type="color" id="pen-color" value="#222222">
                    </div>
                    <div class="prop-group">
                        <label for="pen-width">Pen Width</label>
                        <input type="range" id="pen-width" min="1" max="30" value="3">
                    </div>
                </div>
                <h3>Shape Properties</h3>
                <div class="prop-group">
                    <label for="shape-fill-color">Fill Color</label>
                    <input type="color" id="shape-fill-color" value="#10B981">
                </div>
                <div class="prop-group">
                    <label for="shape-width">Width</label>
                    <input type="number" id="shape-width" min="1" value="100">
                </div>
                <div class="prop-group">
                    <label for="shape-height">Height</label>
                    <input type="number" id="shape-height" min="1" value="100">
                </div>
                <hr>
                <div class="prop-group">
                    <label><input type="checkbox" id="shape-shadow-enable"> Shadow</label>
                    <div id="shape-shadow-controls" style="display:none; margin-top:6px;">
                        <label>Color <input type="color" id="shape-shadow-color" value="#000000"></label>
                        <label>Blur <input type="number" id="shape-shadow-blur" min="0" max="50" value="5"></label>
                        <label>Offset X <input type="number" id="shape-shadow-offset-x" min="-50" max="50" value="5"></label>
                        <label>Offset Y <input type="number" id="shape-shadow-offset-y" min="-50" max="50" value="5"></label>
                    </div>
                </div>
                <div class="prop-group">
                    <label for="shape-blend-mode">Blend Mode</label>
                    <select id="shape-blend-mode">
                        <option value="normal">Normal</option>
                        <option value="multiply">Multiply</option>
                        <option value="screen">Screen</option>
                        <option value="overlay">Overlay</option>
                        <option value="darken">Darken</option>
                        <option value="lighten">Lighten</option>
                        <option value="color-dodge">Color Dodge</option>
                        <option value="color-burn">Color Burn</option>
                        <option value="hard-light">Hard Light</option>
                        <option value="soft-light">Soft Light</option>
                        <option value="difference">Difference</option>
                        <option value="exclusion">Exclusion</option>
                        <option value="hue">Hue</option>
                        <option value="saturation">Saturation</option>
                        <option value="color">Color</option>
                        <option value="luminosity">Luminosity</option>
                    </select>
                </div>
                <div class="prop-group">
                    <label><input type="checkbox" id="shape-gradient-enable"> Gradient Fill</label>
                    <div id="shape-gradient-controls" style="display:none; margin-top:6px;">
                        <label>Start <input type="color" id="shape-gradient-start" value="#10B981"></label>
                        <label>End <input type="color" id="shape-gradient-end" value="#34D399"></label>
                        <label>Angle <input type="range" id="shape-gradient-angle" min="0" max="360" value="0"></label>
                    </div>
                </div>
                <button id="close-shape-sidebar" style="margin-top:12px;">Close</button>
            </div>
                <style>
                .shape-properties-sidebar {
                    position: fixed;
                    top: 80px;
                    right: 32px;
                    width: 320px;
                    background: #fff;
                    border-radius: 10px;
                    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
                    padding: 18px 18px 12px 18px;
                    z-index: 1002;
                    display: flex;
                    flex-direction: column;
                    gap: 12px;
                    max-height: 80vh;
                    overflow-y: auto;
                }
                .shape-properties-sidebar h3 {
                    margin: 0 0 8px 0;
                    font-size: 1.1rem;
                    font-weight: 600;
                }
                .shape-properties-sidebar .prop-group {
                    display: flex;
                    flex-direction: column;
                    gap: 4px;
                }
                .shape-properties-sidebar label {
                    font-size: 0.95rem;
                    color: #333;
                }
                .shape-properties-sidebar input[type="number"] {
                    width: 100%;
                    padding: 4px 6px;
                    border-radius: 4px;
                    border: 1px solid #ddd;
                }
                .shape-properties-sidebar input[type="color"] {
                    width: 36px;
                    height: 28px;
                    border: none;
                    background: none;
                }
                #close-shape-sidebar {
                    align-self: flex-end;
                    background: #eee;
                    border: none;
                    border-radius: 4px;
                    padding: 4px 12px;
                    cursor: pointer;
                }
                </style>
        </div>
            </div>


        </main>
                <!-- Canva-like Shape Sidebar (hidden by default, shown when shape icon is clicked) -->
                <div id="shape-toolbar-sidebar" class="shape-toolbar-sidebar" style="display:none;">
                    <div class="toolbar-header">Shapes</div>
                    <div class="shapes-list">
                        <button class="shape-btn" data-shape="Rectangle" title="Rectangle"><span>▭</span></button>
                        <button class="shape-btn" data-shape="Circle" title="Circle"><span>●</span></button>
                        <button class="shape-btn" data-shape="Triangle" title="Triangle"><span>▲</span></button>
                        <button class="shape-btn" data-shape="Line" title="Line"><span>／</span></button>
                        <button class="shape-btn" data-shape="Arrow" title="Arrow"><span>➔</span></button>
                        <button class="shape-btn" data-shape="Polygon" title="Polygon"><span>⬟</span></button>
                        <button class="shape-btn" data-shape="Star" title="Star"><span>★</span></button>
                        <button class="shape-btn" data-shape="Heart" title="Heart"><span>♥</span></button>
                        <button class="shape-btn" data-shape="Speech Bubble" title="Speech Bubble"><span>💬</span></button>
                    </div>
                </div>

    <input type="file" id="image-upload" hidden accept="image/*">

        <script src="customizescreen.js"></script>
        <script>
            // Shapes dropdown logic
            window.addEventListener('DOMContentLoaded', function() {
                const dropdown = document.getElementById('shapes-dropdown');
                if (dropdown) {
                    dropdown.addEventListener('change', function() {
                        const val = this.value;
                        if (!val) return;
                        if (window.addShapeByName) {
                            window.addShapeByName(val);
                        }
                        this.value = '';
                    });
                }
            });

            // Stepper logic
            // const productSelect = document.getElementById('catalog-product'); // Removed duplicate declaration
            const sizeSelect = document.getElementById('catalog-size');
            const step2 = document.querySelector('.step-2');
            // const startBtn = document.getElementById('start-customizing-btn'); // Removed duplicate declaration
            let selectedProduct = '';
            let selectedSize = '';

            productSelect.addEventListener('change', function() {
                selectedProduct = this.value;
                if (selectedProduct) {
                    step2.style.display = 'block';
                } else {
                    step2.style.display = 'none';
                    sizeSelect.value = '';
                }
                checkStepperReady();
            });

            sizeSelect.addEventListener('change', function() {
                selectedSize = this.value;
                checkStepperReady();
            });

            function checkStepperReady() {
                if (selectedProduct && selectedSize) {
                    startBtn.disabled = false;
                } else {
                    startBtn.disabled = true;
                }
            }


            startBtn.addEventListener('click', function() {
                // Hide stepper, show studio
                document.getElementById('customize-stepper').style.display = 'none';
                document.getElementById('design-studio').style.display = 'block';
                // Fill product/size display
                document.getElementById('product-selected-display').value = productSelect.options[productSelect.selectedIndex].text;
                document.getElementById('size-selected-display').value = sizeSelect.value;

                // Initialize Fabric.js canvas
                if (!window.fabricCanvas) {
                    window.fabricCanvas = new fabric.Canvas('main-canvas');
                }



                // Toolbar functions
                window.addText = function() {
                    const text = new fabric.IText('Enter text here', {
                        left: 150,
                        top: 80,
                        fontSize: 24,
                        fill: '#000000',
                        fontFamily: 'Arial, sans-serif',
                        selectable: true,
                        editable: true,
                        hasControls: true,
                        hasBorders: true
                    });
                    window.fabricCanvas.add(text);
                    window.fabricCanvas.setActiveObject(text);
                    window.fabricCanvas.renderAll();
                };
                window.addRect = function() {
                    const rect = new fabric.Rect({
                        left: 150,
                        top: 80,
                        width: 150,
                        height: 100,
                        fill: '#10B981',
                        stroke: '#059669',
                        strokeWidth: 2,
                        selectable: true
                    });
                    window.fabricCanvas.add(rect);
                    window.fabricCanvas.setActiveObject(rect);
                    window.fabricCanvas.renderAll();
                };
                window.addCircle = function() {
                    const circle = new fabric.Circle({
                        left: 200,
                        top: 80,
                        radius: 50,
                        fill: '#10B981',
                        stroke: '#059669',
                        strokeWidth: 2,
                        selectable: true
                    });
                    window.fabricCanvas.add(circle);
                    window.fabricCanvas.setActiveObject(circle);
                    window.fabricCanvas.renderAll();
                };
                window.triggerUpload = function() {
                    document.getElementById('image-upload').click();
                };
                window.undo = function() {
                    // Simple undo: remove last object
                    const objs = window.fabricCanvas.getObjects();
                    if (objs.length > 0) {
                        window.fabricCanvas.remove(objs[objs.length - 1]);
                        window.fabricCanvas.renderAll();
                    }
                };
                window.redo = function() {
                    // No-op for now
                };
                window.deleteObject = function() {
                    const active = window.fabricCanvas.getActiveObject();
                    if (active) {
                        window.fabricCanvas.remove(active);
                        window.fabricCanvas.renderAll();
                    }
                };
                document.getElementById('image-upload').onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        fabric.Image.fromURL(event.target.result, (img) => {
                            img.scaleToWidth(200);
                            window.fabricCanvas.add(img);
                            window.fabricCanvas.setActiveObject(img);
                            window.fabricCanvas.renderAll();
                        }, {}, { crossOrigin: 'anonymous' });
                    };
                    reader.readAsDataURL(file);
                };
            });

            // header-loader.js
            function loadHeader() {
                fetch('../header.html')
                    .then(response => response.text())
                    .then(data => {
                        const headerPlaceholder = document.getElementById('header-placeholder');
                        if (headerPlaceholder) headerPlaceholder.innerHTML = data;
                    })
                    .catch(error => console.error('Error loading header:', error));
            }
            window.onload = loadHeader;
        </script>
</body>
</html>

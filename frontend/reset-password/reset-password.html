<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shirtify - Reset Password</title>
    <link rel="stylesheet" href="../header.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="reset-password.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="container">
        <div class="card">
            <div class="header-section">
                <div class="logo-area">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <h1>SHIRTIFY</h1>
                </div>
                <p>Create a new password for your account</p>
            </div>

            <div class="form-content">
                <h2>Reset Password</h2>
                <p class="helper-text">Enter your new password below and confirm it to finish resetting your account.</p>

                <form id="resetPasswordForm">
                    <div class="input-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6">
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6">
                    </div>

                    <p id="statusMessage" class="status-message" aria-live="polite"></p>

                    <button type="submit" class="btn-primary">Save New Password</button>
                    <button type="button" class="btn-outline" onclick="goToLogin()">Back To Login</button>
                </form>
            </div>
        </div>
    </div>

    <script src="reset-password.js"></script>
    <script src="../header-loader.js"></script>
</body>
</html>

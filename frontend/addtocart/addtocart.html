<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIRTIFY | Shopping Cart</title>
    <link rel="stylesheet" href="addtocart.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>
    
<div id="header-placeholder"></div>
    <main class="cart-container">
        <section class="cart-items-section">
            <h1 id="hs">Shopping Cart</h1>
            <div id="cart-list">
                </div>
        </section>

        <aside class="order-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">RS 0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span id="shipping">Rs 100.00</span>
            </div>
            <hr>
            <div class="summary-row total">
                <span>Total</span>
                <span id="grand-total">RS 0.00</span>
            </div>

            <div class="promo-section">
                <label>Promo Code</label>
                <div class="promo-input">
                    <input type="text" placeholder="Enter Code">
                    <button class="apply-btn">Apply</button>
                </div>
            </div>

            <button class="checkout-btn" onclick="window.location.href='../pco/pco.html'">Proceed to Checkout</button>
        </aside>
    </main>

    <script src="addtocart.js"></script>
    <script>
        // header-loader.js
        function loadHeader() {
            fetch('../header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                })
                .catch(error => console.error('Error loading header:', error));
        }

        // Run the function when the page loads
        window.onload = loadHeader;
    </script>
</body>
</html>

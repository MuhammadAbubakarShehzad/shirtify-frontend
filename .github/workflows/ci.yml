name: Shirtify CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-codebase:
    name: Codebase Syntax & Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Check for JS syntax errors in backend
      run: |
        node --check backend/server.js

    - name: Install admin side dependencies
      working-directory: ./admin side
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Check for JS syntax errors in admin backend
      run: |
        node --check "admin side/backend/server.js"

    - name: Validate storefront HTML files
      run: |
        echo "Validating storefront HTML structures..."
        find frontend -name "*.html" -exec node -e "const fs = require('fs'); try { const html = fs.readFileSync('{}', 'utf8'); if (!html.includes('<html') || !html.includes('</html>')) throw new Error('Missing html tags'); console.log('✓ {} is valid'); } catch (e) { console.error('✗ error in {}:', e.message); process.exit(1); }" \;

    - name: Verify environment variables template
      run: |
        if [ ! -f .env.example ] && [ ! -f backend/.env.example ]; then
          echo "Warning: No .env.example file found. Creating a template..."
          echo "PORT=5000" > .env.example
          echo "MONGO_URI=mongodb://localhost:27017/shirtify" >> .env.example
          echo "JWT_SECRET=your_jwt_secret" >> .env.example
        fi

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <!-- Performance optimizations -->
    <link rel="dns-prefetch" href="//cdn.tailwindcss.com">
    <link rel="dns-prefetch" href="//unpkg.com">
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="data.js"></script>
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #E0F7F4 0%, #F0F9FF 100%);
            min-height: 100vh;
        }

        .login-card {
            background: white;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        .input-field {
            transition: all 0.2s ease;
            height: 48px;
            padding: 12px 16px;
        }

        .input-field::placeholder {
            color: #9CA3AF;
            opacity: 0.6;
        }

        .input-field:focus {
            border-color: #7DD3C0;
            border-width: 2px;
            padding: 11px 15px;
            box-shadow: 0 0 0 3px rgba(125, 211, 192, 0.1);
        }

        .btn-primary {
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #5DBAA7;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Login Form -->
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="login-card rounded-lg w-full max-w-md p-8 sm:p-10">
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <div
                    class="w-20 h-20 rounded-lg bg-gradient-to-br from-cyan-400 to-cyan-600 flex items-center justify-center shadow-lg">
                    <i data-lucide="shield-check" class="w-12 h-12 text-white" stroke-width="2"></i>
                </div>
            </div>

            <!-- Title -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">
                    Admin Login
                </h1>
                <p class="text-base text-gray-500">
                    Enter your admin credentials to access the dashboard
                </p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-5">
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-900 mb-1.5">
                        Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="admin@example.com" required
                        class="input-field w-full px-4 py-2.5 text-sm border border-gray-300 rounded-lg focus:outline-none bg-white">
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-900 mb-1.5">
                        Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        class="input-field w-full px-4 py-2.5 text-sm border border-gray-300 rounded-lg focus:outline-none bg-white">
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2 cursor-pointer" id="checkboxWrapper">
                        <input type="checkbox" id="remember"
                            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                            title="Remember me for next login">
                        <span class="text-sm text-gray-700">Remember me</span>
                    </div>
                    <a href="#" id="forgotPassword" class="text-sm font-medium text-cyan-500 hover:text-cyan-600"
                        style="color: #7DD3C0;">
                        Forgot password?
                    </a>
                </div>

                <!-- Login Button -->
                <button type="submit"
                    class="btn-primary w-full py-3 px-4 text-white text-sm font-semibold rounded-lg mt-6"
                    style="background-color: #7DD3C0;">
                    Login
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-6 text-center">
                <p class="text-xs text-gray-500">
                    Secure login powered by advanced encryption
                </p>
            </div>
        </div>
    </div>

    <script>
        // Load remembered email
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }

        // Login form handler
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Wait for ShirtifyData to be available
                if (typeof ShirtifyData === 'undefined') {
                    console.error('ShirtifyData not available');
                    alert('System not ready. Please refresh the page.');
                    return;
                }

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const remember = document.getElementById('remember').checked;

                // Store in localStorage if remember me is checked
                if (remember) {
                    localStorage.setItem('rememberedEmail', email);
                } else {
                    localStorage.removeItem('rememberedEmail');
                }

                // Use ShirtifyData authentication (async)
                try {
                    const authResult = await ShirtifyData.authenticateUser(email, password);

                    if (authResult.success) {
                        // Show success message
                        const successMessage = document.createElement('div');
                        successMessage.className = 'mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-emerald-700 text-sm';
                        successMessage.textContent = `Welcome back, ${authResult.user.name}! Redirecting to dashboard...`;
                        loginForm.appendChild(successMessage);

                        // Navigate to dashboard after a brief delay
                        setTimeout(() => {
                            window.location.href = 'dash.html';
                        }, 1500);
                    } else {
                        // Show error message
                        const errorMessage = document.createElement('div');
                        errorMessage.className = 'mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm';
                        errorMessage.textContent = authResult.message || authResult.error || 'Login failed. Please try again.';
                        loginForm.appendChild(errorMessage);

                        // Remove error message after 3 seconds
                        setTimeout(() => {
                            if (errorMessage.parentNode) {
                                errorMessage.parentNode.removeChild(errorMessage);
                            }
                        }, 3000);
                    }
                } catch (error) {
                    console.error('Login error:', error);

                    // FALLBACK: Demo mode handling
                    const isNetworkError = error.name === 'AbortError' ||
                        error.message.includes('Failed to fetch') ||
                        error.message.includes('NetworkError') ||
                        error.message.includes('aborted');

                    let errorMessageText = `Login failed: ${error.message}`;
                    if (isNetworkError) {
                        errorMessageText = '<strong>Connection Timeout</strong><br>The server is not responding.<br><span class="text-xs">Database is likely down. Use Demo Mode below.</span>';
                    }

                    // Show error message with Demo Mode option
                    const errorMessage = document.createElement('div');
                    errorMessage.className = 'mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm';
                    errorMessage.innerHTML = `
                        ${errorMessageText}
                        <div class="mt-2 pt-2 border-t border-red-200">
                            <button type="button" id="forceDemo" class="text-indigo-600 font-semibold hover:text-indigo-800 underline">
                                Enter Demo Mode
                            </button>
                        </div>
                    `;

                    // Remove existing error messages first
                    const existingError = loginForm.querySelector('.bg-red-50');
                    if (existingError) existingError.remove();

                    loginForm.appendChild(errorMessage);

                    // Add listener for the new Demo Mode button
                    document.getElementById('forceDemo').addEventListener('click', () => {
                        // Create demo user
                        const demoUser = {
                            name: 'Admin User (Demo)',
                            email: 'admin@shirtify.com',
                            role: 'admin'
                        };

                        // Store in localStorage
                        localStorage.setItem('shirtify_user', JSON.stringify(demoUser));
                        localStorage.setItem('shirtify_demo_mode', 'true'); // Flag to indicate demo mode

                        // Show success message
                        errorMessage.className = 'mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-emerald-700 text-sm';
                        errorMessage.textContent = `Entering Demo Mode...`;

                        // Navigate to dashboard
                        setTimeout(() => {
                            window.location.href = 'dash.html';
                        }, 1000);
                    });

                    // Auto-remove error after 10 seconds (longer for network errors)
                    setTimeout(() => {
                        if (errorMessage.parentNode && !isNetworkError) {
                            errorMessage.parentNode.removeChild(errorMessage);
                        }
                    }, 10000);

                }
            });
        }

        // Forgot password link (placeholder)
        const forgotPassword = document.getElementById('forgotPassword');
        if (forgotPassword) {
            forgotPassword.addEventListener('click', (e) => {
                e.preventDefault();
                alert('Password reset functionality coming soon!');
            });
        }

        // Performance monitoring
        window.addEventListener('load', () => {
            const loadTime = performance.now();
            console.log(`Page loaded in ${loadTime.toFixed(2)}ms`);
        });

        // Initialize icons
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>

</html>

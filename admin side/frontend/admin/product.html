<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Shirtify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-service.js"></script>
    <link href="https://unpkg.com/lucide-icons/dist/umd/lucide.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html"
                    class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-600">Shirtify</a>
                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="text-gray-500 hover:text-gray-900 relative">
                        <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Product Details -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Loading State -->
        <div id="loading" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
        </div>

        <div id="product-content" class="hidden lg:grid lg:grid-cols-2 lg:gap-x-8 lg:items-start">
            <!-- Image Gallery -->
            <div class="flex flex-col-reverse">
                <div
                    class="w-full aspect-w-1 aspect-h-1 bg-gray-100 rounded-lg overflow-hidden sm:aspect-w-2 sm:aspect-h-3">
                    <img id="product-image" src="https://via.placeholder.com/600" alt="Product image"
                        class="w-full h-full object-center object-cover">
                </div>
            </div>

            <!-- Product Info -->
            <div class="mt-10 px-4 sm:px-0 sm:mt-16 lg:mt-0">
                <h1 id="product-name" class="text-3xl font-extrabold tracking-tight text-gray-900">Loading...</h1>

                <div class="mt-3">
                    <h2 class="sr-only">Product information</h2>
                    <p id="product-price" class="text-3xl text-gray-900">₹0</p>
                </div>

                <div class="mt-6">
                    <h3 class="sr-only">Description</h3>
                    <div id="product-description" class="text-base text-gray-700 space-y-6"></div>
                </div>

                <div class="mt-6">
                    <div class="flex items-center">
                        <i id="stock-icon" data-lucide="check" class="flex-shrink-0 w-5 h-5 text-green-500"></i>
                        <p id="product-stock" class="hidden ml-2 text-sm text-red-600">This product is out of stock</p>
                    </div>
                </div>

                <div class="mt-10 flex sm:flex-col1">
                    <button onclick="addToCart()"
                        class="max-w-xs flex-1 bg-indigo-600 border border-transparent rounded-md py-3 px-8 flex items-center justify-center text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-50 focus:ring-indigo-500 sm:w-full">
                        Add to bag
                    </button>
                </div>

                <div class="mt-6">
                    <a href="index.html" class="text-indigo-600 hover:text-indigo-500 text-sm font-medium">&larr; Back
                        to Products</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Simple function to get query param
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        async function loadProductDetails() {
            const productId = getQueryParam('id');
            if (!productId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                await ShirtifyData.init();
                // Ensure products are loaded
                if (ShirtifyData.products.length === 0) {
                    await new Promise(r => setTimeout(r, 1000)); // wait a bit if empty
                }

                // Find product (using the ID from URL)
                const product = ShirtifyData.products.find(p => p._id === productId);

                if (!product) {
                    document.getElementById('loading').innerHTML = '<p class="text-center text-gray-500">Product not found.</p>';
                    return;
                }

                // Render Details
                document.getElementById('product-name').textContent = product.name;
                document.getElementById('product-price').textContent = `₹${product.price}`;
                document.getElementById('product-description').textContent = product.description || "No description available.";
                document.getElementById('product-image').src = product.image || 'https://via.placeholder.com/600';
                const stockText = document.getElementById('product-stock');
                const stockIcon = document.getElementById('stock-icon');
                if (Number(product.stock || 0) <= 0) {
                    stockText.textContent = 'This product is out of stock';
                    stockText.classList.remove('hidden');
                    stockText.classList.remove('text-gray-500');
                    stockText.classList.add('text-red-600');
                    if (stockIcon) {
                        stockIcon.setAttribute('data-lucide', 'alert-circle');
                        stockIcon.classList.remove('text-green-500');
                        stockIcon.classList.add('text-red-500');
                    }
                } else {
                    stockText.textContent = '';
                    stockText.classList.add('hidden');
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('product-content').classList.remove('hidden');
                document.getElementById('product-content').classList.add('grid'); // Restore grid layout

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerHTML = '<p class="text-center text-red-500">Error loading product.</p>';
            }
        }

        function addToCart() {
            alert("Added to mock cart successfully!");
        }

        loadProductDetails();
    </script>
</body>

</html>
